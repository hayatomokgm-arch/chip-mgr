<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CHIP MGR</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap');
:root{
  --felt:#0b2015;--gold:#d4a017;--gold2:#f0c040;--gdim:rgba(212,160,23,0.22);
  --cream:#f5ead0;--red:#c0392b;--green:#27ae60;--blue:#3498db;
  --dim:rgba(245,234,208,0.4);--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Noto Sans JP',sans-serif;background:var(--felt);
  background-image:radial-gradient(ellipse 100% 40% at 50% 0%,rgba(25,90,50,0.5) 0%,transparent 60%);
  color:var(--cream);display:flex;flex-direction:column;min-height:100dvh;
  padding-top:var(--st);padding-bottom:var(--sb)}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;border-bottom:1px solid var(--gdim);flex-shrink:0}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.12em;
  color:var(--gold2);text-shadow:0 0 20px rgba(240,192,64,.35)}
.bank-box{background:rgba(0,0,0,.45);border:1px solid var(--gdim);border-radius:20px;padding:6px 14px;text-align:right}
.bank-num{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold2);line-height:1}
.bank-lbl{font-size:.6rem;color:var(--dim);letter-spacing:.1em}

.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 160px}

.settings-row{display:flex;gap:8px;align-items:center;padding:10px 14px;
  background:rgba(0,0,0,.3);border:1px solid var(--gdim);border-radius:12px;margin-bottom:14px}
.settings-lbl{font-size:.72rem;color:var(--dim);white-space:nowrap}
.settings-input{width:80px;background:rgba(0,0,0,.4);border:1px solid var(--gdim);border-radius:8px;
  color:var(--cream);padding:7px 8px;font-family:'Bebas Neue',sans-serif;font-size:1rem;
  text-align:right;outline:none;-webkit-appearance:none;margin-left:auto}
.btn-sm{border-radius:8px;padding:7px 12px;font-size:.78rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none;flex-shrink:0;border:1px solid var(--gdim)}
.btn-gold-sm{background:rgba(212,160,23,.15);color:var(--gold2)}

.add-row{display:flex;gap:8px;margin-bottom:14px}
.name-input{flex:1;background:rgba(0,0,0,.45);border:1px solid var(--gdim);border-radius:12px;
  color:var(--cream);padding:12px 14px;font-size:1rem;font-family:'Noto Sans JP',sans-serif;
  outline:none;-webkit-appearance:none}
.name-input::placeholder{color:var(--dim)}
.name-input:focus{border-color:var(--gold)}
.btn-add{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a0f00;border:none;
  border-radius:12px;padding:12px 16px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;
  cursor:pointer;white-space:nowrap;-webkit-appearance:none}

.sec-lbl{font-size:.6rem;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;
  margin-bottom:10px;font-weight:700}

/* PLAYER CARDS */
.players-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.pcard{border:1px solid var(--gdim);border-radius:18px;overflow:hidden;
  background:linear-gradient(135deg,rgba(20,55,30,.7),rgba(0,0,0,.55))}
.pcard.in-debt{border-color:rgba(192,57,43,.5);
  background:linear-gradient(135deg,rgba(50,10,10,.7),rgba(0,0,0,.55))}
.pcard.in-credit{border-color:rgba(52,152,219,.4);
  background:linear-gradient(135deg,rgba(10,25,50,.7),rgba(0,0,0,.55))}
.pcard-top{display:flex;align-items:center;gap:12px;padding:13px 14px 8px}
.avatar{width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(212,160,23,.3),rgba(0,0,0,.6));
  border:1px solid var(--gdim);display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold2);flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:var(--cream)}
.psubline{display:flex;gap:10px;margin-top:3px;flex-wrap:wrap}
.ptag{font-size:.62rem;color:var(--dim)}
.ptag span{font-family:'Bebas Neue',sans-serif;font-size:.8rem;color:var(--cream)}
.pbalance{text-align:right;flex-shrink:0}
.pbal-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;color:var(--gold2)}
.pbal-num.debt{color:#ff6b6b}
.pbal-num.credit{color:#7ec8f0}
.pbal-lbl{font-size:.6rem;color:var(--dim)}
.pbal-tag{font-size:.62rem;margin-top:2px;text-align:right}
.pbal-tag.debt-tag{color:#ff8888}
.pbal-tag.credit-tag{color:#7ec8f0}

.pbtns{display:grid;grid-template-columns:1fr 1fr 1fr 44px;border-top:1px solid var(--gdim)}
.pbtn{border:none;background:none;padding:13px 4px;font-family:'Noto Sans JP',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:3px;-webkit-appearance:none;border-right:1px solid var(--gdim)}
.pbtn:last-child{border-right:none}
.pbtn:active{background:rgba(255,255,255,.07)}
.pbtn-payout{color:var(--gold2)}
.pbtn-return{color:#2ecc71}
.pbtn-back{color:#7ec8f0}
.pbtn-del{color:rgba(255,100,100,.4);font-size:1rem}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;
  background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:10px 14px}
.legend-item{font-size:.68rem;color:var(--dim);display:flex;align-items:center;gap:5px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* SETTLE BTN */
.settle-btn{display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,#1a5c3a,#0d3320);
  border:1.5px solid var(--gold);
  color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
  letter-spacing:.1em;cursor:pointer;-webkit-appearance:none;margin-bottom:18px}
.settle-btn:active{opacity:.85}

/* LOG */
.log-wrap{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.05);
  border-radius:14px;overflow:hidden}
.log-item{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem;gap:8px}
.log-item:last-child{border-bottom:none}
.log-payout{color:var(--gold2)}
.log-return{color:#2ecc71}
.log-back{color:#7ec8f0}
.log-time{color:var(--dim);font-size:.65rem;flex-shrink:0}
.no-items{color:var(--dim);text-align:center;font-size:.8rem;padding:18px 0}

/* OPERATION SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;
  align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:linear-gradient(180deg,#1a3020,#0d1a10);
  border:1px solid var(--gdim);border-bottom:none;border-radius:24px 24px 0 0;
  width:100%;max-width:480px;padding:0 0 calc(var(--sb) + 12px);
  animation:slideUp .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:.5}to{transform:none;opacity:1}}
.sheet-handle{width:40px;height:4px;background:var(--gdim);border-radius:2px;margin:12px auto 14px}
.sheet-header{padding:0 20px 14px;border-bottom:1px solid var(--gdim);
  display:flex;justify-content:space-between;align-items:center}
.sheet-player{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--gold2)}
.sheet-sub{font-size:.68rem;color:var(--dim);text-align:right}
.sheet-sub-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold2)}

.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;margin:14px 16px;
  background:rgba(0,0,0,.4);border-radius:12px;overflow:hidden;border:1px solid var(--gdim)}
.type-btn{padding:12px 4px;border:none;background:none;font-family:'Noto Sans JP',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;color:var(--dim);
  -webkit-appearance:none;line-height:1.3}
.type-btn.al{background:var(--gold);color:#1a0f00}
.type-btn.ar{background:var(--green);color:#fff}
.type-btn.ab{background:var(--blue);color:#fff}
.type-btn:disabled{opacity:.3;cursor:not-allowed}

.counter-display{margin:14px 16px 10px;background:rgba(0,0,0,.5);
  border:1px solid var(--gdim);border-radius:14px;
  display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.counter-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--gold2);line-height:1}
.counter-num.zero{color:var(--dim)}
.counter-lbl{font-size:.65rem;color:var(--dim)}
.btn-clear{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.4);
  border-radius:10px;color:#ff8888;padding:8px 16px;font-size:.8rem;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none}
.btn-clear:active{background:rgba(192,57,43,.4)}

.preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px 14px}
.pbtn-preset{background:rgba(212,160,23,.1);border:1px solid var(--gdim);border-radius:14px;
  color:var(--gold2);font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
  padding:20px 0;cursor:pointer;-webkit-appearance:none;letter-spacing:.05em;
  position:relative;overflow:hidden}
.pbtn-preset:active{background:rgba(212,160,23,.3);border-color:var(--gold)}
.pbtn-preset .badge{position:absolute;top:4px;right:6px;font-size:.6rem;
  color:rgba(212,160,23,.7);font-family:'Noto Sans JP',sans-serif}

.exec-btn{display:block;margin:0 16px;width:calc(100% - 32px);padding:16px;border:none;
  border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;
  letter-spacing:.08em;cursor:pointer;-webkit-appearance:none}
.exec-btn:active{opacity:.88}
.el{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a0f00}
.er{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.eb{background:linear-gradient(135deg,#5dade2,#2980b9);color:#fff}

/* SETTLE MODAL */
.settle-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:200;align-items:center;justify-content:center;padding:16px}
.settle-overlay.open{display:flex}
.settle-modal{background:linear-gradient(160deg,#0f2018,#08120f);
  border:1px solid var(--gold);border-radius:22px;
  width:min(440px,100%);max-height:90vh;display:flex;flex-direction:column;
  animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.smodal-header{padding:18px 20px 12px;border-bottom:1px solid var(--gdim);flex-shrink:0}
.smodal-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.1em;color:var(--gold2)}
.smodal-step{font-size:.7rem;color:var(--dim);margin-top:3px}
.smodal-body{overflow-y:auto;padding:16px 20px;flex:1}
.smodal-footer{padding:12px 20px calc(var(--sb)+10px);border-top:1px solid var(--gdim);
  display:flex;gap:10px;flex-shrink:0}

/* 実数入力 */
.actual-list{display:flex;flex-direction:column;gap:8px}
.actual-item{display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,.3);border-radius:12px;padding:10px 14px;border:1px solid rgba(255,255,255,.05)}
.actual-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--cream);
  min-width:60px;letter-spacing:.05em}
.actual-ledger{flex:1}
.actual-ledger-num{font-family:'Bebas Neue',sans-serif;font-size:.9rem}
.actual-ledger-lbl{font-size:.58rem;color:var(--dim)}
.actual-input{width:76px;background:rgba(0,0,0,.5);border:1px solid var(--gdim);
  border-radius:10px;color:var(--cream);padding:9px 8px;font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;text-align:right;outline:none;-webkit-appearance:none;flex-shrink:0}
.actual-input:focus{border-color:var(--gold)}

/* チェック表示 */
.check-bar{padding:10px 14px;border-radius:10px;font-size:.8rem;font-weight:700;margin-bottom:12px;text-align:center}
.check-bar.ok{color:#2ecc71;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3)}
.check-bar.ng{color:#ff6b6b;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3)}

/* 精算テキスト */
.settle-textarea{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--gdim);
  border-radius:12px;color:var(--cream);font-family:'Noto Sans JP',sans-serif;
  font-size:.88rem;line-height:1.8;padding:14px;resize:none;outline:none;
  min-height:260px;-webkit-appearance:none}

.smodal-btn{flex:1;padding:13px;border:none;border-radius:12px;
  font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;
  cursor:pointer;-webkit-appearance:none}
.smodal-btn:active{opacity:.85}
.btn-next{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a0f00}
.btn-copy{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-back-step{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:var(--dim);font-family:'Noto Sans JP',sans-serif;font-size:.9rem}
.btn-cancel{background:none;border:1px solid rgba(255,255,255,.15);
  color:var(--dim);font-family:'Noto Sans JP',sans-serif;font-size:.9rem}

/* TOAST */
.toast{position:fixed;top:calc(var(--st) + 10px);left:50%;
  transform:translateX(-50%) translateY(-80px);background:rgba(20,40,25,.97);
  border:1px solid var(--gdim);border-radius:14px;padding:12px 20px;
  font-size:.88rem;font-weight:700;color:var(--gold2);z-index:999;
  transition:transform .3s cubic-bezier(.34,1.3,.64,1),opacity .3s;opacity:0;
  white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{color:#ff6b6b;border-color:rgba(192,57,43,.4)}
.toast.ok{color:#2ecc71}
.toast.info{color:#7ec8f0}

.wake-dot{width:6px;height:6px;border-radius:50%;background:#2ecc71;
  display:inline-block;margin-left:6px;opacity:0;vertical-align:middle}
.wake-dot.active{opacity:1;animation:blink 3s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="topbar">
  <div class="app-title">🃏 CHIP MGR <span style="font-size:.9rem;letter-spacing:.15em;color:var(--dim);">-TMB-</span><span class="wake-dot" id="wakeDot"></span></div>
  <div class="bank-box">
    <div class="bank-num" id="bankNum">1000</div>
    <div class="bank-lbl">BANK 残高</div>
  </div>
</div>

<div class="scroll">
  <div class="settings-row">
    <div class="settings-lbl">🏦 初期枚数</div>
    <input class="settings-input" id="initInput" type="number" value="1000" min="1" inputmode="numeric">
    <button class="btn-sm btn-gold-sm" onclick="resetBank()">リセット</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--gold2)"></div>払出し（バンク→P）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div>返却（P→バンク）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7ec8f0"></div>戻し（大勝ち時補充）</div>
  </div>

  <div class="add-row">
    <input class="name-input" id="nameInput" placeholder="名前を入力…" maxlength="8" inputmode="text"
      onkeydown="if(event.key==='Enter'){addPlayer();this.blur()}">
    <button class="btn-add" onclick="addPlayer()">＋追加</button>
  </div>

  <div class="sec-lbl">PLAYERS</div>
  <div class="players-wrap" id="playersList">
    <div class="no-items">プレイヤーを追加してください</div>
  </div>

  <button class="settle-btn" onclick="openSettle()">📋 精算する</button>

  <div class="sec-lbl">HISTORY</div>
  <div class="log-wrap" id="logWrap">
    <div class="no-items">履歴はまだありません</div>
  </div>
</div>

<!-- 操作シート -->
<div class="overlay" id="overlay" onclick="handleOvClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div>
        <div class="sheet-player" id="sName">—</div>
        <div style="font-size:.65rem;color:var(--dim);margin-top:2px" id="sDebt"></div>
      </div>
      <div>
        <div class="sheet-sub">バンク残高</div>
        <div class="sheet-sub-num" id="sBank">—</div>
      </div>
    </div>
    <div class="type-grid">
      <button class="type-btn al" id="tPayout" onclick="setType('payout')">📤<br>払出し</button>
      <button class="type-btn"    id="tReturn" onclick="setType('return')">📥<br>返　却</button>
      <button class="type-btn"    id="tBack"   onclick="setType('back')">🔄<br>戻　し</button>
    </div>
    <div class="counter-display">
      <div>
        <div class="counter-lbl">合計枚数</div>
        <div class="counter-num zero" id="counterNum">0</div>
      </div>
      <button class="btn-clear" onclick="clearCounter()">CLEAR</button>
    </div>
    <div class="preset-grid" id="presets"></div>
    <button class="exec-btn el" id="execBtn" onclick="execAction()">払出し 実行</button>
  </div>
</div>

<!-- 精算モーダル -->
<div class="settle-overlay" id="settleOverlay">
  <div class="settle-modal">
    <div class="smodal-header">
      <div class="smodal-title" id="smodalTitle">📋 手持ちチップを入力</div>
      <div class="smodal-step" id="smodalStep">実際の手持ち枚数を入力してください</div>
    </div>
    <div class="smodal-body" id="smodalBody"></div>
    <div class="smodal-footer" id="smodalFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let players = [];
let bank = 1000;
let initBank = 1000;
let logs = [];
let activeId = null;
let ctype = 'payout';
let counter = 0;
let tapCounts = {};
const PRESETS = [1, 5, 10, 20];

// ── WAKE LOCK ──
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeDot').classList.add('active');
      wakeLock.addEventListener('release', () => {
        document.getElementById('wakeDot').classList.remove('active');
      });
    }
  } catch(e) {}
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') await requestWakeLock();
});
requestWakeLock();

// ── BANK ──
function resetBank() {
  const v = parseInt(document.getElementById('initInput').value);
  if (!v || v < 1) return;
  initBank = v;
  const circ = players.reduce((s, p) => s + p.payout - p.returned, 0);
  bank = v - circ;
  renderAll();
  toast('バンクをリセットしました', 'ok');
}

// ── PLAYER ──
function addPlayer(name) {
  name = (name || document.getElementById('nameInput').value).trim();
  if (!name) return;
  if (players.find(p => p.name === name)) { toast('同名のプレイヤーがいます', 'err'); return; }
  players.push({ id: Date.now(), name, payout: 0, returned: 0, back: 0 });
  document.getElementById('nameInput').value = '';
  renderAll();
}

function removePlayer(id) {
  const p = players.find(p => p.id === id);
  if (!p) return;
  const net = bankBalance(p);
  if (net !== 0 && !confirm(`${p.name}の残高が${net}枚残っています。削除しますか？`)) return;
  if (net < 0) bank += Math.abs(net);
  if (net > 0) bank -= net;
  players = players.filter(q => q.id !== id);
  renderAll();
}

// リアルタイム表示用：バンクへの純負債
// 正=バンクへの負債（赤）　負=バンクへの債権（青）
function bankBalance(p) {
  return (p.payout - p.returned) - p.back;
}

// ── COUNTER ──
function updateCounter() {
  const el = document.getElementById('counterNum');
  el.textContent = counter;
  el.className = 'counter-num' + (counter === 0 ? ' zero' : '');
  PRESETS.forEach(n => {
    const b = document.getElementById('badge-' + n);
    if (b) b.textContent = tapCounts[n] ? `×${tapCounts[n]}` : '';
  });
}
function addPreset(n) { counter += n; tapCounts[n] = (tapCounts[n] || 0) + 1; updateCounter(); }
function clearCounter() { counter = 0; tapCounts = {}; updateCounter(); }

// ── SHEET ──
function openSheet(id, type) {
  const p = players.find(p => p.id === id);
  if (!p) return;
  activeId = id;
  counter = 0; tapCounts = {};
  document.getElementById('sName').textContent = p.name;
  document.getElementById('sBank').textContent = bank;

  // 負債状況表示
  const outstanding = p.payout - p.returned; // バンクへの未返済
  const bb = bankBalance(p);
  let debtMsg = '';
  if (bb > 0) debtMsg = `バンク負債: ${bb}枚`;
  else if (bb < 0) debtMsg = `バンク債権: ${Math.abs(bb)}枚`;
  else debtMsg = 'バンク精算済み';
  document.getElementById('sDebt').textContent = debtMsg;

  setType(type || 'payout');
  document.getElementById('presets').innerHTML = PRESETS.map(n =>
    `<button class="pbtn-preset" onclick="addPreset(${n})">+${n}<span class="badge" id="badge-${n}"></span></button>`
  ).join('');
  updateCounter();
  document.getElementById('overlay').classList.add('open');
}

function closeSheet() { document.getElementById('overlay').classList.remove('open'); activeId = null; }
function handleOvClick(e) { if (e.target === document.getElementById('overlay')) closeSheet(); }

function setType(t) {
  ctype = t;
  const p = players.find(p => p.id === activeId);

  // 戻しボタン：バンク負債がある場合はdisabled
  const backBtn = document.getElementById('tBack');
  if (p) {
    const outstanding = p.payout - p.returned;
    if (outstanding > 0) {
      backBtn.disabled = true;
      backBtn.title = 'バンク負債を返却してから戻しを行ってください';
      if (t === 'back') t = 'payout'; // 強制的にpayoutへ
    } else {
      backBtn.disabled = false;
    }
  }
  ctype = t;
  document.getElementById('tPayout').className = 'type-btn' + (t === 'payout' ? ' al' : '');
  document.getElementById('tReturn').className  = 'type-btn' + (t === 'return' ? ' ar' : '');
  document.getElementById('tBack').className    = 'type-btn' + (t === 'back'   ? ' ab' : '') + (document.getElementById('tBack').disabled ? ' disabled' : '');
  const btn = document.getElementById('execBtn');
  if (t === 'payout') { btn.className = 'exec-btn el'; btn.textContent = '払出し 実行'; }
  if (t === 'return') { btn.className = 'exec-btn er'; btn.textContent = '返　却 実行'; }
  if (t === 'back')   { btn.className = 'exec-btn eb'; btn.textContent = '戻　し 実行'; }
}

function execAction() {
  const p = players.find(p => p.id === activeId);
  if (!p) return;
  const amt = counter;
  if (!amt || amt <= 0) { toast('枚数を選択してください', 'err'); return; }

  if (ctype === 'payout') {
    if (amt > bank) { toast(`バンク不足 (残${bank}枚)`, 'err'); return; }
    p.payout += amt; bank -= amt;
    addLog(`📤 ${p.name} ← ${amt}枚 払出し`, 'payout');
    toast(`${p.name} に ${amt}枚 払出し`, 'ok');

  } else if (ctype === 'return') {
    const outstanding = p.payout - p.returned;
    if (amt > outstanding) { toast(`返却超過 (未返済${outstanding}枚)`, 'err'); return; }
    p.returned += amt; bank += amt;
    addLog(`📥 ${p.name} → ${amt}枚 返却`, 'return');
    toast(`${p.name} から ${amt}枚 返却`, 'ok');

  } else if (ctype === 'back') {
    const outstanding = p.payout - p.returned;
    if (outstanding > 0) { toast(`バンク負債(${outstanding}枚)を先に返却してください`, 'err'); return; }
    p.back += amt; bank += amt;
    addLog(`🔄 ${p.name} → ${amt}枚 戻し`, 'back');
    toast(`${p.name} が ${amt}枚 戻し`, 'info');
  }

  closeSheet();
  renderAll();
}

// ── 精算フロー ──
function openSettle() {
  if (players.length === 0) { toast('プレイヤーがいません', 'err'); return; }
  renderSettleInput();
  document.getElementById('settleOverlay').classList.add('open');
}

function closeSettle() {
  document.getElementById('settleOverlay').classList.remove('open');
}

function renderSettleInput() {
  document.getElementById('smodalTitle').textContent = '📋 手持ちチップを入力';
  document.getElementById('smodalStep').textContent = '実際の手持ち枚数を入力してください';

  document.getElementById('smodalBody').innerHTML = `
    <div class="actual-list">
      ${players.map(p => {
        const bb = bankBalance(p);
        const bbLabel = bb > 0 ? `負債 ${bb}枚` : bb < 0 ? `債権 ${Math.abs(bb)}枚` : '精算済';
        const bbColor = bb > 0 ? '#ff8888' : bb < 0 ? '#7ec8f0' : 'var(--dim)';
        return `
        <div class="actual-item">
          <div class="actual-name">${esc(p.name)}</div>
          <div class="actual-ledger">
            <div class="actual-ledger-num" style="color:${bbColor}">${bbLabel}</div>
            <div class="actual-ledger-lbl">バンク残高</div>
          </div>
          <input class="actual-input" id="actual-${p.id}" type="number" min="0"
            placeholder="0" inputmode="numeric">
        </div>`;
      }).join('')}
    </div>
    <div style="margin-top:12px;font-size:.7rem;color:var(--dim);text-align:center;">
      ※手持ちを入力後「計算する」を押してください
    </div>`;

  document.getElementById('smodalFooter').innerHTML = `
    <button class="smodal-btn btn-cancel" onclick="closeSettle()">キャンセル</button>
    <button class="smodal-btn btn-next" onclick="calcSettle()">計算する →</button>`;
}

function calcSettle() {
  // 手持ち枚数を取得
  const actuals = {};
  let allFilled = true;
  players.forEach(p => {
    const el = document.getElementById('actual-' + p.id);
    if (!el || el.value === '') { allFilled = false; return; }
    actuals[p.id] = parseInt(el.value) || 0;
  });
  if (!allFilled) { toast('全員の手持ちを入力してください', 'err'); return; }

  // 勝敗計算：手持ち - 払出し + 返却 + 戻し
  const results = players.map(p => {
    const held = actuals[p.id];
    const win = held - p.payout + p.returned + p.back;
    return { name: p.name, win, held };
  }).sort((a, b) => b.win - a.win);

  // 総数チェック：全員手持ち合計 + バンク残 = 初期枚数
  const totalHeld = results.reduce((s, r) => s + r.held, 0);
  const totalCheck = totalHeld + bank;
  const isOk = totalCheck === initBank;

  // テキスト生成
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  const instructions = calcMinSettlement(results);

  let lines = [];
  lines.push('🃏 CHIP MGR -TMB-');
  lines.push('──────────────────');
  results.forEach(r => {
    const sign = r.win >= 0 ? '＋' : '－';
    const abs = Math.abs(r.win);
    const trophy = r.win > 0 ? ' 🏆' : r.win === 0 ? ' 🟰' : '';
    lines.push(`${r.name}　${sign}${abs}枚${trophy}`);
  });
  lines.push('──────────────────');
  lines.push(`チップ総数　${isOk ? '±0 ✅' : `差異${totalCheck - initBank > 0 ? '+' : ''}${totalCheck - initBank}枚 ⚠️`}`);
  if (instructions.length > 0) {
    lines.push('');
    lines.push(`💸 精算指示（${instructions.length}回）`);
    instructions.forEach(ins => {
      lines.push(`${ins.from} → ${ins.to}　${ins.amt}枚`);
    });
  }
  lines.push('──────────────────');
  lines.push(dateStr);

  const txt = lines.join('\n');
  const checkMsg = isOk
    ? `✅ チップ総数一致（${initBank}枚）`
    : `⚠️ 差異あり：手持合計${totalHeld}枚 + バンク${bank}枚 = ${totalCheck}枚（初期${initBank}枚）`;

  document.getElementById('smodalTitle').textContent = '📋 精算レポート';
  document.getElementById('smodalStep').textContent = isOk ? '✅ 収支一致' : '⚠️ 収支に差異あり';
  document.getElementById('smodalBody').innerHTML = `
    <div class="check-bar ${isOk ? 'ok' : 'ng'}">${checkMsg}</div>
    <textarea class="settle-textarea" id="settleText" readonly>${txt}</textarea>`;
  document.getElementById('smodalFooter').innerHTML = `
    <button class="smodal-btn btn-back-step" onclick="renderSettleInput()">← 戻る</button>
    <button class="smodal-btn btn-copy" onclick="copySettle()">📋 コピー</button>`;
}

// 最小回数精算（貪欲法）
function calcMinSettlement(results) {
  let bal = results.map(r => ({ name: r.name, amt: r.win }));
  const instructions = [];
  for (let i = 0; i < 200; i++) {
    bal.sort((a, b) => a.amt - b.amt);
    const debtor   = bal[0];
    const creditor = bal[bal.length - 1];
    if (Math.abs(debtor.amt) < 1 || creditor.amt < 1) break;
    const amt = Math.min(Math.abs(debtor.amt), creditor.amt);
    instructions.push({ from: debtor.name, to: creditor.name, amt });
    debtor.amt   += amt;
    creditor.amt -= amt;
  }
  return instructions;
}

function copySettle() {
  const txt = document.getElementById('settleText').value;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => toast('コピーしました！LINEに貼り付けてください', 'ok'));
  } else {
    const ta = document.getElementById('settleText');
    ta.select(); document.execCommand('copy');
    toast('コピーしました！', 'ok');
  }
}

// ── RENDER ──
function renderAll() {
  document.getElementById('bankNum').textContent = bank;
  const el = document.getElementById('playersList');
  if (!players.length) {
    el.innerHTML = '<div class="no-items">プレイヤーを追加してください</div>';
  } else {
    el.innerHTML = players.map(p => {
      const bb = bankBalance(p);
      const isDebt   = bb > 0;
      const isCredit = bb < 0;
      const sign = isDebt ? '－' : '＋';
      const cls  = isDebt ? 'debt' : isCredit ? 'credit' : '';
      const tag  = isDebt ? `<div class="pbal-tag debt-tag">バンク負債</div>`
                 : isCredit ? `<div class="pbal-tag credit-tag">バンク債権</div>` : '';
      return `
      <div class="pcard ${isDebt ? 'in-debt' : isCredit ? 'in-credit' : ''}">
        <div class="pcard-top">
          <div class="avatar">${p.name.charAt(0).toUpperCase()}</div>
          <div class="pinfo">
            <div class="pname">${esc(p.name)}</div>
            <div class="psubline">
              <div class="ptag">払出<span>${p.payout}</span></div>
              <div class="ptag">返却<span>${p.returned}</span></div>
              <div class="ptag">戻し<span>${p.back}</span></div>
            </div>
          </div>
          <div class="pbalance">
            <div class="pbal-lbl">純残高</div>
            <div class="pbal-num ${cls}">${sign}${Math.abs(bb)}</div>
            ${tag}
          </div>
        </div>
        <div class="pbtns">
          <button class="pbtn pbtn-payout" onclick="openSheet(${p.id},'payout')">📤払出し</button>
          <button class="pbtn pbtn-return" onclick="openSheet(${p.id},'return')">📥返却</button>
          <button class="pbtn pbtn-back"   onclick="openSheet(${p.id},'back')">🔄戻し</button>
          <button class="pbtn pbtn-del"    onclick="removePlayer(${p.id})">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  const lw = document.getElementById('logWrap');
  if (!logs.length) {
    lw.innerHTML = '<div class="no-items">履歴はまだありません</div>';
  } else {
    lw.innerHTML = logs.slice(0, 30).map(l =>
      `<div class="log-item"><span class="log-${l.t}">${esc(l.txt)}</span><span class="log-time">${l.time}</span></div>`
    ).join('');
  }
}

function addLog(txt, t) {
  const now = new Date();
  const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  logs.unshift({ txt, t, time });
  if (logs.length > 60) logs.pop();
}

let tt;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(tt);
  tt = setTimeout(() => el.classList.remove('show'), 2800);
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderAll();
</script>
